{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | TheHope</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-brown: #5d4037;
            --light-brown: #d7ccc8; 
            --dark-brown: #451a03;
            --bg-sand: #fdfaf7;
            --card-border: #e3d5ca;
            --text-muted: #7f5539;
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-color: var(--light-brown);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* --- GLOBAL HEADER --- */
        .navbar {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 18px 8%; 
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px); 
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1.5px solid var(--card-border);
        }

        .logo {
            color: var(--dark-brown); 
            margin: 0; 
            font-size: 1.8rem; 
            letter-spacing: -1.5px;
            font-weight: 800;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none; 
            color: var(--text-muted); 
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .nav-links a:hover {
            color: var(--dark-brown);
            opacity: 1;
        }

        /* --- CENTERED CONTENT --- */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            z-index: 10;
        }

        /* --- SIGNUP CARD --- */
        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 45px;
            width: 100%;
            max-width: 420px;
            border-radius: 40px;
            border: 2px solid var(--dark-brown);
            box-shadow: 0 25px 50px rgba(69, 26, 3, 0.15);
            text-align: center;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 80px rgba(69, 26, 3, 0.2);
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 700;
            color: var(--text-muted);
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* --- FORM STYLES --- */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--dark-brown);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-left: 5px;
            display: block;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            margin-top: 8px;
            border: 2px solid var(--card-border);
            border-radius: 15px;
            outline: none;
            font-family: inherit;
            font-weight: 600;
            background: var(--bg-sand);
            color: var(--dark-brown);
            font-size: 0.95rem;
        }

        input:focus {
            border-color: var(--dark-brown);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(69, 26, 3, 0.05);
        }

        button {
            width: 100%;
            padding: 18px;
            margin-top: 15px;
            background: var(--dark-brown);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(69, 26, 3, 0.2);
        }

        button:hover {
            transform: scale(1.02);
            background-color: var(--primary-brown);
        }

        .login-link {
            display: block;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 700;
        }

        .login-link:hover {
            color: var(--dark-brown);
            text-decoration: underline;
        }

        /* --- RIVER (Soft Flow) --- */
        .river-canvas {
            position: fixed; 
            bottom: 0; left: 0; width: 100%; height: 25vh; 
            z-index: 2; pointer-events: none;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="/" class="logo">TheHope.✨</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/accounts/login/">Login</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="card">
            <h2>JOIN THE JOURNEY</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="input-group">
                    <label>Username</label>
                    {{ form.username }}
                </div>

                <div class="input-group">
                    <label>Password</label>
                    {{ form.password1 }}
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    {{ form.password2 }}
                </div>

                <button type="submit">Create Account</button>
            </form>

            <a href="/accounts/login/" class="login-link">Already have an account? Login</a>
        </div>
    </div>

    <canvas id="riverCanvas" class="river-canvas"></canvas>

    <script>
        const canvas = document.getElementById('riverCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.25;
        }
        window.addEventListener('resize', resize);
        resize();

        let time = 0;
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(69, 26, 3, 0.07)"; 
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for(let x = 0; x <= canvas.width; x += 15) {
                const y = canvas.height * 0.6 + Math.sin(x * 0.015 + time) * 10;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();
            time += 0.03;
            requestAnimationFrame(draw);
        }
        draw();
    </script>

</body>
</html>
