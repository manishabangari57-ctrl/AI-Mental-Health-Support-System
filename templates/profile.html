{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | TheHope</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-brown: #5d4037;
            --light-brown: #d7ccc8; /* LIGHT LATTE BACKGROUND */
            --dark-brown: #451a03;
            --bg-sand: #fdfaf7;
            --card-border: #e3d5ca;
            --text-main: #2d1b18;
            --text-muted: #7f5539;
        }

        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-color: var(--light-brown); /* UPDATED TO LIGHT BROWN */
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- NAVIGATION (SYNCED STYLE) --- */
        .navbar {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 18px 8%; 
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px); 
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1.5px solid var(--card-border);
        }

        .logo {
            color: var(--dark-brown); 
            margin: 0; 
            font-size: 1.8rem; 
            letter-spacing: -1.5px;
            font-weight: 800;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none; 
            color: var(--text-muted); 
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--dark-brown);
            opacity: 1;
        }

        /* --- CONTAINER & CARD --- */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 45px;
            width: 480px;
            border-radius: 40px;
            border: 2px solid var(--dark-brown);
            box-shadow: 0 25px 50px rgba(69, 26, 3, 0.15);
            position: relative;
            z-index: 10;
        }

        .card h2 {
            margin-bottom: 30px;
            font-weight: 800;
            color: var(--dark-brown);
            font-size: 2rem;
            letter-spacing: -1px;
            text-align: center;
        }

        /* --- FORM ELEMENTS --- */
        label {
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--dark-brown);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding-left: 5px;
        }

        .select-wrapper {
            position: relative;
            width: 100%;
        }

        /* Styling for the Django-rendered select inputs */
        select {
            width: 100%;
            padding: 16px 20px;
            border-radius: 18px;
            border: 2px solid var(--card-border);
            background: var(--bg-sand);
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-main);
            appearance: none;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: var(--dark-brown);
            background: white;
            box-shadow: 0 0 0 4px rgba(69, 26, 3, 0.05);
        }

        .select-wrapper::after {
            content: "↓";
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 800;
            color: var(--primary-brown);
            pointer-events: none;
        }

        /* --- BUTTON --- */
        button {
            width: 100%;
            margin-top: 35px;
            padding: 18px;
            background: var(--dark-brown);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(69, 26, 3, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            background-color: var(--primary-brown);
            box-shadow: 0 15px 30px rgba(69, 26, 3, 0.3);
        }

        /* --- MESSAGES --- */
        .success {
            background: #dcfce7;
            color: #166534;
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 700;
            border: 1px solid #bbf7d0;
        }

        /* --- RIVER (Subtle Flow) --- */
        .river-canvas {
            position: fixed; 
            bottom: 0; left: 0; width: 100%; height: 25vh; 
            z-index: 2; pointer-events: none;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .card { padding: 30px; }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="/" class="logo">TheHope.✨</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/mood/">Mood</a>
            <a href="/assessment/">Assessment</a>
            <a href="/ai-mood/">AI Insight</a>
            <a href="/profile/" class="active">Profile</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Your Profile 🧑‍💻</h2>

            {% if messages %}
                {% for message in messages %}
                    <div class="success">{{ message }} ✨</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <label>Age Range</label>
                <div class="select-wrapper">
                    {{ form.age }}
                </div>

                <label>Gender</label>
                <div class="select-wrapper">
                    {{ form.gender }}
                </div>

                <label>Main Concern</label>
                <div class="select-wrapper">
                    {{ form.concern }}
                </div>

                <button type="submit">Save Profile Settings</button>
            </form>
        </div>
    </div>

    <canvas id="riverCanvas" class="river-canvas"></canvas>

    <script>
        const canvas = document.getElementById('riverCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.25;
        }
        window.addEventListener('resize', resize);
        resize();

        let time = 0;
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(69, 26, 3, 0.06)"; 
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for(let x = 0; x <= canvas.width; x += 15) {
                const y = canvas.height * 0.6 + Math.sin(x * 0.015 + time) * 10;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();
            time += 0.03;
            requestAnimationFrame(draw);
        }
        draw();
    </script>

</body>
</html>
